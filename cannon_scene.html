<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dread Pirate Studio — Media Blast</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html { overflow:hidden; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: Georgia, serif;
  }

  /* Scroll trap overlay — invisible, catches scroll events */
  #scroll-trap {
    position: fixed;
    inset: 0;
    z-index: 100;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
  }

  /* Tall inner div to give the scroll trap range */
  #scroll-trap-inner {
    height: 500vh;
    width: 1px;
  }

  /* The actual scene */
  #scene {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 1;
  }

  /* Dark overlay that fades out as sequence starts */
  #curtain {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 50;
    pointer-events: none;
    opacity: 1;
    transition: none;
  }

  /* Scroll hint at the start */
  #scroll-hint {
    position: absolute;
    bottom: 3rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    color: rgba(201,168,76,0.8);
    text-align: center;
    letter-spacing: 0.3em;
    font-size: 0.75rem;
    text-transform: uppercase;
    opacity: 1;
    transition: opacity 0.5s;
    pointer-events: none;
  }

  #scroll-hint span {
    display: block;
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, rgba(201,168,76,0.8), transparent);
    margin: 0.5rem auto 0;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.3;} 50%{opacity:1;} }

  /* Scene layers */
  .layer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
  }

  .layer img {
    width: 100%;
    display: block;
    mix-blend-mode: screen;
  }

  /* CLOUDS — background strip along bottom */
  #layer-clouds {
    bottom: 0;
    height: 25%;
    z-index: 2;
    opacity: 0;
    transform: translateY(60px);
  }
  #layer-clouds img { height: 100%; width: 100%; object-fit: cover; object-position: center top; }

  /* CROWD — right side */
  #layer-crowd {
    bottom: 0;
    left: auto;
    right: -2%;
    width: 58%;
    height: auto;
    z-index: 3;
    opacity: 0;
    transform: translateX(120px);
  }

  /* CANNON — left side */
  #layer-cannon {
    bottom: 0;
    left: -5%;
    width: 50%;
    height: auto;
    z-index: 4;
    opacity: 0;
    transform: translateX(-120px);
  }

  /* MEDIA BLAST */
  #layer-media {
    bottom: 10%;
    left: 20%;
    width: 65%;
    height: auto;
    z-index: 5;
    opacity: 0;
    transform: scale(0.05) translateX(-400px) rotate(-15deg);
    transform-origin: left center;
  }

  /* Muzzle flash */
  #flash {
    position: absolute;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,220,80,1) 0%, rgba(255,120,0,0.8) 40%, transparent 70%);
    z-index: 6;
    opacity: 0;
    pointer-events: none;
    left: 43%;
    bottom: 34%;
    transform: translate(-50%, 50%);
  }

  /* Smoke puff */
  .smoke {
    position: absolute;
    border-radius: 50%;
    background: rgba(220,220,220,0.7);
    pointer-events: none;
    z-index: 7;
    opacity: 0;
  }

  /* Progress bar */
  #progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: rgba(201,168,76,0.5);
    z-index: 60;
    width: 0%;
    pointer-events: none;
    transition: width 0.05s linear;
  }

  /* "Scroll to continue" text after scene completes */
  #continue-hint {
    position: absolute;
    bottom: 3rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    color: rgba(201,168,76,0.7);
    text-align: center;
    letter-spacing: 0.3em;
    font-size: 0.7rem;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s;
  }

  /* The rest of the page content below */
  #page-content {
    position: fixed;
    top: 100vh;
    left: 0;
    width: 100%;
    z-index: 0;
    background: #080808;
    transition: top 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  #page-content.revealed {
    top: 0;
  }

  /* Gold glow background */
  #glow {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse 50% 40% at 30% 70%, rgba(201,168,76,0.06) 0%, transparent 60%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s;
  }
</style>
</head>
<body>

<!-- Scroll trap: catches wheel/touch scroll, drives animation -->
<div id="scroll-trap">
  <div id="scroll-trap-inner"></div>
</div>

<!-- The cinematic scene -->
<div id="scene">
  <div id="glow"></div>

  <div class="layer" id="layer-clouds">
    <img src="clouds.png" alt="">
  </div>

  <div class="layer" id="layer-crowd">
    <img src="crowd.png" alt="">
  </div>

  <div class="layer" id="layer-cannon">
    <img src="cannon.png" alt="">
  </div>

  <div class="layer" id="layer-media">
    <img src="media.png" alt="">
  </div>

  <div id="flash"></div>
  <div id="curtain"></div>
  <div id="progress"></div>

  <div id="scroll-hint">
    Scroll to begin
    <span></span>
  </div>

  <div id="continue-hint">&#8595; Keep scrolling</div>
</div>

<script>
  // ---- SEQUENCE DEFINITION ----
  // The full sequence is driven by scrollProgress: 0 to 1
  // We map scroll position to animation state via keyframes

  var trap = document.getElementById('scroll-trap');
  var curtain = document.getElementById('scroll-hint') ? document.getElementById('curtain') : null;
  var scrollHint = document.getElementById('scroll-hint');
  var continueHint = document.getElementById('continue-hint');
  var progress = document.getElementById('progress');
  var glow = document.getElementById('glow');
  var flash = document.getElementById('flash');
  var scene = document.getElementById('scene');

  var clouds = document.getElementById('layer-clouds');
  var crowd  = document.getElementById('layer-crowd');
  var cannon = document.getElementById('layer-cannon');
  var media  = document.getElementById('layer-media');
  var curtainEl = document.getElementById('curtain');

  var sequenceDone = false;
  var scrollLocked = true; // lock normal scrolling until sequence done

  // Lerp helper
  function lerp(a, b, t) { return a + (b - a) * Math.clamp01(t); }
  Math.clamp01 = function(v) { return Math.max(0, Math.min(1, v)); };

  // Map a range [inA, inB] -> [outA, outB]
  function mapRange(val, inA, inB, outA, outB) {
    var t = Math.clamp01((val - inA) / (inB - inA));
    // ease in out cubic
    t = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    return outA + (outB - outA) * t;
  }

  function mapRangeLinear(val, inA, inB, outA, outB) {
    var t = Math.clamp01((val - inA) / (inB - inA));
    return outA + (outB - outA) * t;
  }

  // Smoke spawn
  var smokePuffs = [];
  function spawnSmoke() {
    for (var i = 0; i < 14; i++) {
      var puff = document.createElement('div');
      puff.className = 'smoke';
      var size = 15 + Math.random() * 35;
      puff.style.width  = size + 'px';
      puff.style.height = size + 'px';
      puff.style.left   = (40 + Math.random() * 8) + '%';
      puff.style.bottom = (30 + Math.random() * 12) + '%';
      puff.dataset.vx = (Math.random() * 3 + 1) * (Math.random() < 0.5 ? 1 : -0.3);
      puff.dataset.vy = -(Math.random() * 2 + 1);
      puff.dataset.life = 0;
      puff.dataset.maxLife = 0.8 + Math.random() * 0.5;
      puff.style.opacity = 0;
      scene.appendChild(puff);
      smokePuffs.push(puff);
    }
  }

  var lastTime = 0;
  function animateSmoke(now) {
    var dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    var i = smokePuffs.length - 1;
    while (i >= 0) {
      var puff = smokePuffs[i];
      var life = parseFloat(puff.dataset.life) + dt;
      var maxLife = parseFloat(puff.dataset.maxLife);
      if (life >= maxLife) {
        if (puff.parentNode) puff.parentNode.removeChild(puff);
        smokePuffs.splice(i, 1);
      } else {
        var progress2 = life / maxLife;
        var opacity = progress2 < 0.2 ? (progress2 / 0.2) * 0.7 : (1 - progress2) * 0.7;
        var currentLeft = parseFloat(puff.style.left) + parseFloat(puff.dataset.vx) * dt;
        var currentBottom = parseFloat(puff.style.bottom) + parseFloat(puff.dataset.vy) * dt * 5;
        puff.style.opacity = opacity;
        puff.style.left   = currentLeft + '%';
        puff.style.bottom = currentBottom + '%';
        puff.style.transform = 'scale(' + (0.5 + progress2 * 2) + ')';
        puff.dataset.life = life;
      }
      i--;
    }
    if (smokePuffs.length > 0) requestAnimationFrame(animateSmoke);
  }

  var flashActive = false;
  function triggerFlash() {
    if (flashActive) return;
    flashActive = true;
    flash.style.opacity = '1';
    spawnSmoke();
    requestAnimationFrame(function(t) { lastTime = t; animateSmoke(t); });
    setTimeout(function() {
      flash.style.transition = 'opacity 0.15s';
      flash.style.opacity = '0';
      setTimeout(function() {
        flash.style.transition = '';
        flashActive = false;
      }, 200);
    }, 80);
  }

  // ---- SCROLL DRIVEN ANIMATION ----
  // Phases (scroll progress 0..1):
  // 0.00 - 0.08  : curtain fades out, scene reveals
  // 0.08 - 0.22  : cannon slides in from left
  // 0.18 - 0.32  : clouds drift up from bottom
  // 0.26 - 0.40  : crowd slides in from right
  // 0.42 - 0.50  : cannon FIRES (flash + smoke, one-shot trigger)
  // 0.50 - 0.72  : media blast shoots from cannon to crowd
  // 0.72 - 0.85  : crowd gets blasted off screen to the right
  // 0.85 - 1.00  : everything fades, sequence unlocks scroll

  var firedAt = -1;
  var lastProgress = 0;

  function applyScrollState(p) {
    progress.style.width = (p * 100) + '%';

    // CURTAIN
    curtainEl.style.opacity = mapRangeLinear(p, 0, 0.06, 1, 0);

    // SCROLL HINT
    scrollHint.style.opacity = mapRangeLinear(p, 0, 0.04, 1, 0);

    // GLOW
    glow.style.opacity = mapRangeLinear(p, 0.05, 0.20, 0, 1);

    // CANNON — slides in from left
    var cannonX = mapRange(p, 0.06, 0.22, -140, 0);
    var cannonOp = mapRangeLinear(p, 0.06, 0.18, 0, 1);
    cannon.style.opacity = cannonOp;
    cannon.style.transform = 'translateX(' + cannonX + 'px)';

    // CLOUDS — rise from bottom
    var cloudsY = mapRange(p, 0.16, 0.30, 60, 0);
    var cloudsOp = mapRangeLinear(p, 0.16, 0.26, 0, 0.5);
    clouds.style.opacity = cloudsOp;
    clouds.style.transform = 'translateY(' + cloudsY + 'px)';

    // CROWD — slides in from right
    var crowdX = mapRange(p, 0.26, 0.42, 160, 0);
    var crowdOp = mapRangeLinear(p, 0.26, 0.38, 0, 1);
    crowd.style.opacity = crowdOp;
    crowd.style.transform = 'translateX(' + crowdX + 'px)';

    // FIRE TRIGGER — one-shot at p=0.44
    if (p >= 0.44 && firedAt < 0) {
      firedAt = p;
      triggerFlash();
    }
    // Allow re-trigger if scrolling backwards past it
    if (p < 0.40 && firedAt >= 0) {
      firedAt = -1;
    }

    // MEDIA BLAST — shoots from cannon mouth toward crowd
    if (p < 0.44) {
      media.style.opacity = 0;
      media.style.transform = 'scale(0.05) translateX(-400px) rotate(-15deg)';
    } else if (p <= 0.70) {
      var blastP = mapRangeLinear(p, 0.44, 0.70, 0, 1);
      // Ease out expo
      var easedBlast = 1 - Math.pow(1 - blastP, 3);
      var blastScale = 0.15 + easedBlast * 0.85;
      var blastX    = -400 + easedBlast * 400;
      var blastRot  = -15 + easedBlast * 15;
      media.style.opacity = Math.clamp01(blastP * 3);
      media.style.transform = 'scale(' + blastScale + ') translateX(' + blastX + 'px) rotate(' + blastRot + 'deg)';
    } else {
      media.style.opacity = mapRangeLinear(p, 0.70, 0.82, 1, 0);
      media.style.transform = 'scale(1) translateX(400px) rotate(5deg)';
    }

    // CROWD GETS BLASTED — flies off right
    if (p >= 0.68) {
      var blastCrowd = mapRange(p, 0.68, 0.85, 0, 1);
      var crowdBlastX = blastCrowd * 300;
      var crowdBlastOp = mapRangeLinear(p, 0.72, 0.88, 1, 0);
      crowd.style.transform = 'translateX(' + crowdBlastX + 'px)';
      crowd.style.opacity = crowdBlastOp;
    }

    // CANNON RECOIL when firing
    if (p >= 0.44 && p <= 0.52) {
      var recoil = mapRange(p, 0.44, 0.48, 0, -18);
      var recoilBack = mapRange(p, 0.48, 0.52, -18, 0);
      var actualRecoil = p < 0.48 ? recoil : recoilBack;
      cannon.style.transform = 'translateX(' + actualRecoil + 'px)';
    } else if (p > 0.52 && p < 0.68) {
      cannon.style.transform = 'translateX(0px)';
    }

    // SEQUENCE COMPLETE
    if (p >= 0.98 && !sequenceDone) {
      sequenceDone = true;
      scrollLocked = false;
      continueHint.style.opacity = '1';
      progress.style.opacity = '0';
      // Unlock normal scroll
      trap.style.pointerEvents = 'none';
      document.body.style.overflow = '';
      document.documentElement.style.overflow = '';
    }
  }

  // ---- SCROLL HANDLER ----
  // Intercept scroll on the trap element and translate to progress
  var totalScrollRange = 4 * window.innerHeight; // 4x viewport height of scroll = full sequence
  var accumulatedScroll = 0;
  var targetScroll = 0;
  var currentProgress = 0;
  var animating = false;

  function onScroll() {
    if (sequenceDone) return;
    targetScroll = trap.scrollTop;
    if (!animating) {
      animating = true;
      requestAnimationFrame(smoothScroll);
    }
  }

  function smoothScroll() {
    currentProgress += (targetScroll / totalScrollRange - currentProgress) * 0.12;
    var p = Math.clamp01(currentProgress);
    applyScrollState(p);
    if (Math.abs(currentProgress - targetScroll / totalScrollRange) > 0.0005 || smokePuffs.length > 0) {
      requestAnimationFrame(smoothScroll);
    } else {
      animating = false;
    }
  }

  trap.addEventListener('scroll', onScroll);

  // Initial state
  applyScrollState(0);

  // Keyboard scroll support
  window.addEventListener('keydown', function(e) {
    if (sequenceDone) return;
    if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault();
      trap.scrollTop = Math.min(trap.scrollTop + 120, totalScrollRange);
    }
    if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault();
      trap.scrollTop = Math.max(trap.scrollTop - 120, 0);
    }
  });
</script>
</body>
</html>
