<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew — Dread Pirate Studio</title>
<link rel="icon" type="image/png" href="../icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #080808;
    --deep:     #0d0f14;
    --surface:  #131620;
    --gold:     #c9a84c;
    --gold-dim: #8a6f2e;
    --gold-glow:rgba(201,168,76,0.18);
    --white:    #e8e0d0;
    --muted:    #6b6355;
    --border:   rgba(201,168,76,0.15);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--white); font-family:'Crimson Text',Georgia,serif; font-size:18px; overflow-x:hidden; }

  nav { position:fixed; top:0; left:0; right:0; z-index:900; padding:0 2rem; height:72px; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(to bottom,rgba(8,8,8,0.95),rgba(8,8,8,0.7)); border-bottom:1px solid var(--border); backdrop-filter:blur(12px); }
  .nav-logo { text-decoration:none; }
  .nav-logo img { height:44px; width:auto; }
  .nav-back { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); text-decoration:none; transition:color 0.3s; }
  .nav-back:hover { color:var(--gold); }

  /* Hero strip */
  .profile-hero {
    min-height:100vh; display:flex; align-items:flex-end;
    position:relative; padding:0 0 4rem;
    background:linear-gradient(180deg,#080808 0%,#0a0c10 60%,#080808 100%);
    overflow:hidden;
  }
  .profile-hero-bg {
    position:absolute; inset:0; z-index:0;
    background:radial-gradient(ellipse 70% 50% at 50% 40%, rgba(201,168,76,0.07) 0%, transparent 70%);
  }
  .profile-hero-inner { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:8rem 2rem 0; width:100%; display:grid; grid-template-columns:320px 1fr; gap:4rem; align-items:end; }

  .profile-photo-wrap { position:relative; }
  .profile-photo {
    width:100%; aspect-ratio:1/1; border-radius:4px;
    background:var(--deep); border:1px solid var(--border);
    overflow:hidden; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 40px rgba(201,168,76,0.1);
  }
  .profile-photo img { width:100%; height:100%; object-fit:cover; }
  .profile-photo .placeholder { font-size:6rem; opacity:0.12; }

  .profile-identity { padding-bottom:0.5rem; }
  .profile-rank { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.5em; text-transform:uppercase; color:var(--gold); opacity:0.7; margin-bottom:0.5rem; }
  .profile-name { font-family:'Cinzel Decorative',serif; font-size:clamp(2.2rem,5vw,4rem); color:var(--white); line-height:1.1; margin-bottom:1.5rem; }
  .profile-disciplines { display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:2rem; }
  .discipline-tag { padding:0.3rem 0.9rem; border:1px solid var(--border); font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold-dim); background:rgba(201,168,76,0.04); }
  .profile-quote { border-left:2px solid var(--gold-dim); padding-left:1.5rem; color:var(--muted); font-style:italic; font-size:1.15rem; line-height:1.6; max-width:540px; }

  /* Main content */
  main { max-width:1100px; margin:0 auto; padding:4rem 2rem; display:grid; grid-template-columns:1fr 360px; gap:4rem; }

  .profile-bio-section h2 { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); opacity:0.7; margin-bottom:1.5rem; }
  .profile-bio { color:var(--muted); line-height:1.9; font-size:1.05rem; }
  .profile-bio p { margin-bottom:1rem; }

  .profile-embed { margin-top:3rem; }
  .profile-embed h2 { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); opacity:0.7; margin-bottom:1.25rem; }
  .embed-wrap { border:1px solid var(--border); border-radius:4px; overflow:hidden; background:var(--deep); }
  .embed-wrap iframe { display:block; width:100%; border:none; }
  .youtube-wrap { position:relative; width:100%; padding-top:56.25%; }
  .youtube-wrap iframe { position:absolute; top:0; left:0; width:100%; height:100%; }

  /* Sidebar */
  .profile-sidebar {}
  .sidebar-section { margin-bottom:2.5rem; }
  .sidebar-label { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); opacity:0.7; margin-bottom:1rem; border-bottom:1px solid var(--border); padding-bottom:0.5rem; }
  .link-list { list-style:none; }
  .link-list li { margin-bottom:0.5rem; }
  .link-list a { display:flex; align-items:center; gap:0.75rem; padding:0.6rem 1rem; border:1px solid var(--border); background:var(--surface); text-decoration:none; color:var(--muted); font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; transition:all 0.3s; }
  .link-list a:hover { border-color:var(--gold-dim); color:var(--gold); background:rgba(201,168,76,0.04); }
  .link-list a span { margin-left:auto; opacity:0.4; font-size:0.75rem; }

  footer { border-top:1px solid var(--border); padding:2rem; text-align:center; background:var(--black); }
  .footer-text { font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; }

  .loading { text-align:center; padding:8rem 2rem; color:var(--muted); font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; }
  .not-found { text-align:center; padding:8rem 2rem; }
  .not-found h2 { font-family:'Cinzel Decorative',serif; color:var(--gold); margin-bottom:1rem; }

  @media (max-width:768px) {
    .profile-hero-inner { grid-template-columns:1fr; gap:2rem; }
    .profile-photo-wrap { max-width:220px; }
    main { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-logo"><img src="../logo-horizontal.png" alt="Dread Pirate Studio"></a>
  <a href="../crew.html" class="nav-back">&#8592; The Crew</a>
</nav>

<div id="page-loading" class="loading">Loading&hellip;</div>

<div id="page-content" style="display:none;">
  <div class="profile-hero">
    <div class="profile-hero-bg"></div>
    <div class="profile-hero-inner">
      <div class="profile-photo-wrap">
        <div class="profile-photo" id="profile-photo">
          <div class="placeholder">&#9760;</div>
        </div>
      </div>
      <div class="profile-identity">
        <p class="profile-rank" id="profile-rank"></p>
        <h1 class="profile-name" id="profile-name"></h1>
        <div class="profile-disciplines" id="profile-disciplines"></div>
        <blockquote class="profile-quote" id="profile-quote" style="display:none;"></blockquote>
      </div>
    </div>
  </div>

  <main>
    <div class="profile-main">
      <section class="profile-bio-section">
        <h2>About</h2>
        <div class="profile-bio" id="profile-bio"></div>
      </section>
      <section class="profile-embed" id="embed-section" style="display:none;">
        <h2>Featured</h2>
        <div class="embed-wrap" id="embed-wrap"></div>
      </section>
    </div>

    <aside class="profile-sidebar">
      <div class="sidebar-section" id="links-section" style="display:none;">
        <p class="sidebar-label">Find Me Online</p>
        <ul class="link-list" id="link-list"></ul>
      </div>
      <div class="sidebar-section">
        <p class="sidebar-label">Dread Pirate Studio</p>
        <ul class="link-list">
          <li><a href="../index.html">&#127754; Back to the Ship <span>&#8594;</span></a></li>
          <li><a href="../crew.html">&#128100; The Full Crew <span>&#8594;</span></a></li>
        </ul>
      </div>
    </aside>
  </main>
</div>

<div id="page-404" style="display:none;" class="not-found">
  <h2>Lost at Sea</h2>
  <p style="color:var(--muted);">That crew member couldn't be found.</p><br>
  <a href="../crew.html" style="color:var(--gold);font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.2em;">&#8592; Back to the Crew</a>
</div>

<footer>
  <p class="footer-text">&copy; 2026 Dread Pirate Studio &nbsp;&middot;&nbsp; dreadpiratestudio.com</p>
</footer>

<script>
  var SUPABASE_URL = 'https://efylfnnshmaauhiwqaxj.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_XWIUAf_n31K4x-AXkSO5Sg_IwppPmww';

  // Get slug from filename: crew/gabe.html -> 'gabe'
  var slug = window.location.pathname.split('/').pop().replace('.html','');

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function loadProfile() {
    var url = SUPABASE_URL + '/rest/v1/crew_profiles?slug=eq.' + encodeURIComponent(slug) + '&published=eq.true&select=*&limit=1';
    fetch(url, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('page-loading').style.display = 'none';
      if (!data || data.length === 0) {
        document.getElementById('page-404').style.display = 'block';
        return;
      }
      renderProfile(data[0]);
    })
    .catch(function() {
      document.getElementById('page-loading').innerHTML = 'Could not load profile. Please try again.';
    });
  }

  function renderProfile(p) {
    document.title = p.display_name + ' — Dread Pirate Studio';

    // Photo
    if (p.photo_url) {
      document.getElementById('profile-photo').innerHTML = '<img src="' + esc(p.photo_url) + '" alt="' + esc(p.display_name) + '">';
    }

    // Identity
    document.getElementById('profile-rank').textContent = p.rank;
    document.getElementById('profile-name').textContent = p.display_name;

    // Disciplines
    var discEl = document.getElementById('profile-disciplines');
    if (p.disciplines && p.disciplines.length) {
      var dHtml = '';
      for (var i = 0; i < p.disciplines.length; i++) {
        dHtml += '<span class="discipline-tag">' + esc(p.disciplines[i]) + '</span>';
      }
      discEl.innerHTML = dHtml;
    }

    // Quote
    if (p.quote) {
      var qEl = document.getElementById('profile-quote');
      qEl.textContent = p.quote;
      qEl.style.display = 'block';
    }

    // Bio
    var bioEl = document.getElementById('profile-bio');
    if (p.bio) {
      var paras = p.bio.split('\n\n');
      var bHtml = '';
      for (var j = 0; j < paras.length; j++) {
        if (paras[j].trim()) bHtml += '<p>' + esc(paras[j].trim()) + '</p>';
      }
      bioEl.innerHTML = bHtml || '<p>' + esc(p.bio) + '</p>';
    } else {
      bioEl.innerHTML = '<p style="color:var(--muted);font-style:italic;">Bio coming soon.</p>';
    }

    // Links
    var links = [
      {label: p.link_1_label, url: p.link_1_url},
      {label: p.link_2_label, url: p.link_2_url},
      {label: p.link_3_label, url: p.link_3_url},
      {label: p.link_4_label, url: p.link_4_url}
    ];
    var linkHtml = '';
    for (var k = 0; k < links.length; k++) {
      if (links[k].label && links[k].url) {
        linkHtml += '<li><a href="' + esc(links[k].url) + '" target="_blank" rel="noopener">' + esc(links[k].label) + '<span>&#8594;</span></a></li>';
      }
    }
    if (linkHtml) {
      document.getElementById('link-list').innerHTML = linkHtml;
      document.getElementById('links-section').style.display = 'block';
    }

    // Embed
    if (p.embed_url && p.embed_type) {
      var embedWrap = document.getElementById('embed-wrap');
      if (p.embed_type === 'soundcloud') {
        embedWrap.innerHTML = '<iframe height="166" scrolling="no" allow="autoplay" src="' + esc(p.embed_url) + '"></iframe>';
      } else if (p.embed_type === 'youtube') {
        embedWrap.className = 'embed-wrap youtube-wrap';
        embedWrap.innerHTML = '<iframe src="' + esc(p.embed_url) + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
      }
      document.getElementById('embed-section').style.display = 'block';
    }

    document.getElementById('page-content').style.display = 'block';
  }

  loadProfile();
</script>
</body>
</html>
